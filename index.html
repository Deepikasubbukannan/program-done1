<p>World" refers to the totality of reality, Earth as a planet, or the human population. It often describes specific areas, periods, or fields of activity (e.g., "the ancient world" or "the world of art"). Synonyms include earth, globe, universe, cosmos, reality, humanity, and sphere</p>
